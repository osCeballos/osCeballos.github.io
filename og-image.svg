<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
    <defs>
        <radialGradient id="glow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
            <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.3" />
            <stop offset="100%" stop-color="#09090b" stop-opacity="0" />
        </radialGradient>
        <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffffff" />
            <stop offset="100%" stop-color="#a1a1aa" />
        </linearGradient>
    </defs>
    
    <rect width="1200" height="630" fill="#09090b" />
    <circle cx="600" cy="315" r="500" fill="url(#glow)" />
    
    <!-- Grid -->
    <path d="M0 100 H1200 M0 200 H1200 M0 300 H1200 M0 400 H1200 M0 500 H1200 M0 600 H1200" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1" />
    <path d="M200 0 V630 M400 0 V630 M600 0 V630 M800 0 V630 M1000 0 V630" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1" />
    
    <!-- Logo -->
    <g transform="translate(150, 180) scale(2)">
        <path d="M 75 25 A 35 35 0 1 0 75 75" stroke="#8B5CF6" stroke-width="20" fill="none" />
        <polyline points="60 30 80 50 60 70" stroke="#22C55E" stroke-width="16" fill="none" stroke-linejoin="miter" />
    </g>

    <text x="150" y="420" font-family="'Inter', sans-serif" font-weight="700" font-size="64" fill="url(#textGrad)">
        Oscar Ceballos Cano
    </text>
    
    <text x="150" y="480" font-family="'JetBrains Mono', monospace" font-weight="400" font-size="32" fill="#8B5CF6">
        UX/UI Designer &amp; Front-End Developer
    </text>
    
    <text x="150" y="540" font-family="'Inter', sans-serif" font-weight="400" font-size="24" fill="#71717a">
        Design-to-Code Efficiency.
    </text>
</svg>
